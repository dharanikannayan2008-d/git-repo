<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FoodShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4"><i class="fas fa-leaf text-success"></i> Create Account</h2>
                        
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form th:action="@{/auth/register}" method="post" th:object="${registerDTO}">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName" th:field="*{firstName}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" th:field="*{lastName}" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" th:field="*{email}" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="phone" class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="phone" th:field="*{phone}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="city" class="form-label">City</label>
                                    <input type="text" class="form-control" id="city" th:field="*{city}" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="role" class="form-label">I want to:</label>
                                <select class="form-select" id="role" th:field="*{role}" required onchange="updateRoleFields()">
                                    <option value="">Select your role</option>
                                    <option value="DONOR">Donate Food</option>
                                    <option value="RECEIVER">Receive Food</option>
                                </select>
                            </div>

                            <div id="orgFields" style="display:none;">
                                <div class="mb-3">
                                    <label for="organizationName" class="form-label">Organization Name</label>
                                    <input type="text" class="form-control" id="organizationName" th:field="*{organizationName}">
                                </div>
                                <div class="mb-3">
                                    <label for="organizationType" class="form-label">Organization Type</label>
                                    <select class="form-select" id="organizationType" th:field="*{organizationType}">
                                        <option value="">Select type</option>
                                        <option value="NGO">NGO</option>
                                        <option value="Charity">Charity</option>
                                        <option value="Volunteer">Volunteer</option>
                                        <option value="Orphanage">Orphanage</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" th:field="*{password}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                                    <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-custom-green w-100 mb-3">
                                <i class="fas fa-user-plus"></i> Create Account
                            </button>
                        </form>

                        <hr>
                        <p class="text-center mb-0">
                            Already have an account? <a href="/auth/login" class="text-decoration-none">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateRoleFields() {
            const role = document.getElementById('role').value;
            document.getElementById('orgFields').style.display = role === 'RECEIVER' ? 'block' : 'none';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
