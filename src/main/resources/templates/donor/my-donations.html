<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donations - FoodShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-leaf"></i> FoodShare
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/donor/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/donor/add-food">Add Food</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/donor/my-donations">My Donations</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="container">
            <h1 class="mb-4"><i class="fas fa-list"></i> My Donations</h1>

            <div class="row" th:if="${donations.isEmpty()}">
                <div class="col-md-12">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i> No donations yet. <a href="/donor/add-food">Add your first donation</a>
                    </div>
                </div>
            </div>

            <div class="row" th:unless="${donations.isEmpty()}">
                <div class="col-md-12">
                    <div class="row">
                        <div class="col-md-4 mb-4" th:each="donation : ${donations}">
                            <div class="card h-100 shadow-sm">
                                <div th:if="${donation.foodImagePath}" class="card-img-top" style="background-image: url([[${donation.foodImagePath}]]); height: 200px; background-size: cover; background-position: center;"></div>
                                <div th:unless="${donation.foodImagePath}" class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                                    <i class="fas fa-image fa-3x text-muted"></i>
                                </div>
                                <div class="card-body">
                                    <h5 class="card-title" th:text="${donation.foodName}">Food Name</h5>
                                    <p class="card-text text-muted" th:text="${donation.description}">Description</p>
                                    <div class="mb-2">
                                        <span class="badge bg-info" th:text="${donation.category.displayName}">Category</span>
                                        <span class="badge" th:classappend="${donation.status.toString() == 'AVAILABLE' ? 'bg-success' : donation.status.toString() == 'COLLECTED' ? 'bg-info' : 'bg-warning'}" th:text="${donation.status.displayName}">Status</span>
                                    </div>
                                    <p class="small mb-2">
                                        <strong>Quantity:</strong> <span th:text="${donation.quantity} + ' ' + ${donation.unit}">Qty</span>
                                    </p>
                                    <p class="small mb-2">
                                        <strong>City:</strong> <span th:text="${donation.pickupCity}">City</span>
                                    </p>
                                </div>
                                <div class="card-footer bg-white border-top">
                                    <div class="d-flex gap-2">
                                        <a th:href="@{/donor/edit-food/{id}(id=${donation.donationId})}" class="btn btn-sm btn-warning flex-grow-1"><i class="fas fa-edit"></i> Edit</a>
                                        <a th:href="@{/donor/delete-food/{id}(id=${donation.donationId})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')"><i class="fas fa-trash"></i> Delete</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer mt-5">
        <div class="container text-center py-4">
            <p>&copy; 2024 Smart Leftover Food Sharing System. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
