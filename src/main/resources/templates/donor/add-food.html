<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Food - FoodShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-leaf"></i> FoodShare
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-custom-green text-white">
                        <h4><i class="fas fa-plus-circle"></i> Add Food Donation</h4>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form th:action="@{/donor/add-food}" method="post" enctype="multipart/form-data" th:object="${foodDonationDTO}">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="foodName" class="form-label">Food Name</label>
                                    <input type="text" class="form-control" id="foodName" th:field="*{foodName}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="category" class="form-label">Category</label>
                                    <select class="form-select" id="category" th:field="*{category}" required>
                                        <option value="">Select Category</option>
                                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.displayName}">Category</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="quantity" class="form-label">Quantity</label>
                                    <input type="number" class="form-control" id="quantity" th:field="*{quantity}" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="unit" class="form-label">Unit</label>
                                    <select class="form-select" id="unit" th:field="*{unit}" required>
                                        <option value="kg">kg</option>
                                        <option value="pieces">pieces</option>
                                        <option value="liters">liters</option>
                                        <option value="boxes">boxes</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="imageFile" class="form-label">Food Image</label>
                                    <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="expiryTime" class="form-label">Expiry Time</label>
                                    <input type="datetime-local" class="form-control" id="expiryTime" th:field="*{expiryTime}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="pickupDeadline" class="form-label">Pickup Deadline</label>
                                    <input type="datetime-local" class="form-control" id="pickupDeadline" th:field="*{pickupDeadline}" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="pickupAddress" class="form-label">Pickup Address</label>
                                    <input type="text" class="form-control" id="pickupAddress" th:field="*{pickupAddress}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="pickupCity" class="form-label">City</label>
                                    <input type="text" class="form-control" id="pickupCity" th:field="*{pickupCity}" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="contactNumber" class="form-label">Contact Number</label>
                                <input type="tel" class="form-control" id="contactNumber" th:field="*{contactNumber}" required>
                            </div>

                            <div class="mb-3">
                                <label for="specialInstructions" class="form-label">Special Instructions</label>
                                <textarea class="form-control" id="specialInstructions" th:field="*{specialInstructions}" rows="3" placeholder="e.g., Keep refrigerated, Handle with care"></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-custom-green">
                                    <i class="fas fa-check-circle"></i> Add Donation
                                </button>
                                <a href="/donor/dashboard" class="btn btn-secondary">
                                    <i class="fas fa-times-circle"></i> Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
